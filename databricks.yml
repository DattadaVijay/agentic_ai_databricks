# This is a Databricks asset bundle definition for agentic_ai_databricks.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: agentic_ai_databricks
  uuid: 0f001416-a55f-4cb9-95c6-6b8fb9306851

include:
  - resources/*.yml
  - resources/*/*.yml

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-e3761da8-7d95.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://dbc-e3761da8-7d95.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/dattada.vijay@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/dattada.vijay@gmail.com/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: dattada.vijay@gmail.com
        level: CAN_MANAGE
