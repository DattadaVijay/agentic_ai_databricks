# The main job for agentic_ai_databricks.
resources:
  jobs:
    agentic_ai_databricks_job:
      name: agentic_ai_databricks_job

      tasks:
        - task_key: Basics_of_model_calling
          notebook_task:
            notebook_path: ../src/groq_chat_client/response.py

        - task_key: Parametrising_the_prompts
          depends_on: 
            - task_key: Basics_of_model_calling
          notebook_task:
            notebook_path: "../src/groq_chat_client/response_2.py"
            base_parameters:
              platform: "databricks"
              field: "Agentic AI"
              topic: "langchain commands as cheatcode"
              length: "5"

          - task_key: adding_tools_to_langchain
            depends_on: Basics_of_model_calling
            max_retries: 0
            notebook_task:
              notebook_path: "../src/groq_chat_client/response_3.py"



