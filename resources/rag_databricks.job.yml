resources:
    jobs:
        rag_agentic_job:
            name: "rag_agentic_job"

            tags: 
                learning: RAG
                catalog: system

            
            tasks:
                - task_key: chroma_db
                  max_retries: 0
                  notebook_task:
                    notebook_path: ../src/groq_chat_client/rag_model/Chroma.py

                - task_key: faiss
                  max_retries: 0
                  depends_on:
                    - task_key: chroma_db
                  notebook_task:
                    notebook_path: ../src/groq_chat_client/rag_model/FAISS.py

                - task_key: pinecone
                  max_retries: 0
                  depends_on:
                    - task_key: faiss
                  notebook_task:
                    notebook_path: ../src/groq_chat_client/rag_model/pinecone.py

                - task_key: rag_as_agent
                  max_retries:0
                  depends_on:
                    - task_key: pinecone
                  notebook_task:
                    notebook_path: ../src/groq_chat_client/rag_model/rag_agent.py

                    
