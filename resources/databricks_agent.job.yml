resources:
  jobs:
    databricks_agent_job:
      name: databricks_agent_job
      tags:
        learning: agents
        catalog: system
      tasks:
        - task_key: "get_job_id"
          max_retries: 0
          notebook_task:
            notebook_path: ../src/groq_chat_client/data_steward/agent.py
            base_parameters:
              job_name: "${var.job_name}"

        - task_key: "tool_test"
          depends_on:
            - task_key: "get_job_id"
          for_each_task:
            inputs: |
              [
                {"messages": [{"role": "user", "content": "What is the job ID of ${var.job_name}?"}]},
                {"messages": [{"role": "user", "content": "What is the current status of run for job_id of ${var.job_id}?"}]}
              ]
            task:
              task_key: "run_agent_task"
              notebook_task:
                notebook_path: ../src/groq_chat_client/data_steward/agent_2.py
                base_parameters:
                  messages: "{{input.messages}}"