resources:
  jobs:
    databricks_agent_job:
      name: databricks_agent_job
      tags:
        learning: agents
        catalog: system
      tasks:
        - task_key: "tool_test"
          for_each_task:
            inputs: |
              [
                {"messages": [{"role": "user", "content": "What is the job ID of ${var.job_name}?"}]},
                {"messages": [{"role": "user", "content": "Who is the creator of job named ${var.job_name}?"}]}
              ]
            task:
              task_key: "run_agent_task"
              notebook_task:
                notebook_path: ../src/groq_chat_client/data_steward/agent_2.py
                base_parameters:
                  messages: "{{input.messages}}"

        - task_key: "loading_agent_as_model"
          max_retries: 0
          depends_on: 
            - task_key: tool_test
          notebook_task:
            notebook_path: ../src/groq_chat_client/data_steward/agent_3.py

        - task_key: "logging_model_mlflow"
          max_retries: 0
          depends_on: 
            - task_key: loading_agent_as_model
          notebook_task:
            notebook_path: ../src/groq_chat_client/data_steward/pack_agent.py

        - task_key: "registring_model"
          max_retries: 0
          depends_on: 
            - task_key: logging_model_mlflow
        notebook_task:
            notebook_path: ../src/groq_chat_client/data_steward/model_registry.py
            base_parameters: 
                run_id: {{tasks.logging_model_mlflow.values.run_id}}

